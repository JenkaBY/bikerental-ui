name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PROJECT_NAME: bikerental-ui

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Lint (ESLint + angular-eslint)
        run: npm run lint

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run gateway tests
        run: npx ng test gateway --configuration=ci

      - name: Run admin tests
        run: npx ng test admin --configuration=ci

      - name: Run operator tests
        run: npx ng test operator --configuration=ci

      - name: Run shared tests
        run: npx ng test shared --configuration=ci

      - name: Merge coverage reports
        run: |
          mkdir -p coverage/merged
          cat coverage/gateway/lcov.info coverage/admin/lcov.info coverage/operator/lcov.info coverage/shared/lcov.info > coverage/merged/lcov.info

      - name: Publish gateway coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: gateway
          threshold-icons: "{0: '🔴', 80: '🔵', 90: '🟢'}"
          json-summary-path: coverage/gateway/coverage-summary.json
          json-final-path: coverage/gateway/coverage-final.json

      - name: Publish admin coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: admin
          threshold-icons: "{0: '🔴', 80: '🔵', 90: '🟢'}"
          json-summary-path: coverage/admin/coverage-summary.json
          json-final-path: coverage/admin/coverage-final.json

      - name: Publish operator coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: operator
          threshold-icons: "{0: '🔴', 80: '🔵', 90: '🟢'}"
          json-summary-path: coverage/operator/coverage-summary.json
          json-final-path: coverage/operator/coverage-final.json

      - name: Publish shared coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: shared
          threshold-icons: "{0: '🔴', 80: '🔵', 90: '🟢'}"
          json-summary-path: coverage/shared/coverage-summary.json
          json-final-path: coverage/shared/coverage-final.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  build:
    name: Build Angular Application
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ quality, test ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject Bike Rental API host into all apps
        env:
          BIKE_RENTAL_API: ${{ vars.BIKE_RENTAL_API }}
        run: |
          sed -i "s|BIKE_API_PLACEHOLDER|${BIKE_RENTAL_API}|g" projects/gateway/src/environments/environment.prod.ts
          sed -i "s|BIKE_API_PLACEHOLDER|${BIKE_RENTAL_API}|g" projects/admin/src/environments/environment.prod.ts
          sed -i "s|BIKE_API_PLACEHOLDER|${BIKE_RENTAL_API}|g" projects/operator/src/environments/environment.prod.ts
          sed -i "s|BIKE_API_PLACEHOLDER|${BIKE_RENTAL_API}|g" projects/shared/environments/environment.prod.ts

      - name: Build gateway
        run: npx ng build gateway --configuration production --base-href /${{ github.event.repository.name }}/

      - name: Build admin
        run: npx ng build admin --configuration production --base-href /${{ github.event.repository.name }}/admin/

      - name: Build operator
        run: npx ng build operator --configuration production --base-href /${{ github.event.repository.name }}/operator/

      - name: Assemble staging directory
        run: |
          mkdir -p staging/admin staging/operator
          cp -r dist/gateway/browser/. staging/
          cp -r dist/admin/browser/. staging/admin/
          cp -r dist/operator/browser/. staging/operator/

      - name: Create root redirect to /en/
        run: |
          BASE="/${{ github.event.repository.name }}"
          cat > staging/index.html << 'HTMLEOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Bike Rental</title>
              <meta http-equiv="refresh" content="0; url=BASE_PLACEHOLDER/en/" />
              <script>window.location.replace('BASE_PLACEHOLDER/en/');</script>
            </head>
            <body></body>
          </html>
          HTMLEOF
          sed -i "s|BASE_PLACEHOLDER|${BASE}|g" staging/index.html

      - name: Add 404.html for SPA routing
        run: |
          # gateway
          cp staging/index.html staging/404.html
          cp staging/en/index.html staging/en/404.html
          cp staging/ru/index.html staging/ru/404.html
          # admin
          cp staging/admin/en/index.html staging/admin/en/404.html
          cp staging/admin/ru/index.html staging/admin/ru/404.html
          # operator
          cp staging/operator/en/index.html staging/operator/en/404.html
          cp staging/operator/ru/index.html staging/operator/ru/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: staging

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [ quality, test, build ]
    if: always()
    steps:
      - name: All CI checks passed
        run: |
          if [[ "${{ needs.quality.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ ci ]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
