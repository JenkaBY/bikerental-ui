name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      disable_service_worker:
        description: 'EMERGENCY: unregister the operator PWA service worker and wipe its caches on every client'
        type: boolean
        default: false

env:
  PROJECT_NAME: bikerental-ui

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Lint (ESLint + angular-eslint)
        run: npm run lint

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run gateway tests
        run: npx ng test gateway --configuration=ci

      - name: Run admin tests
        run: npx ng test admin --configuration=ci

      - name: Run operator tests
        run: npx ng test operator --configuration=ci

      - name: Run shared tests
        run: npx ng test shared --configuration=ci

      - name: Merge coverage reports
        run: |
          mkdir -p coverage/merged
          cat coverage/gateway/lcov.info coverage/admin/lcov.info coverage/operator/lcov.info coverage/shared/lcov.info > coverage/merged/lcov.info

      - name: Publish gateway coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: gateway
          threshold-icons: "{0: '🔴', 80: '🔵', 90: '🟢'}"
          json-summary-path: coverage/gateway/coverage-summary.json
          json-final-path: coverage/gateway/coverage-final.json

      - name: Publish admin coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: admin
          threshold-icons: "{0: '🔴', 80: '🔵', 90: '🟢'}"
          json-summary-path: coverage/admin/coverage-summary.json
          json-final-path: coverage/admin/coverage-final.json

      - name: Publish operator coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: operator
          threshold-icons: "{0: '🔴', 80: '🔵', 90: '🟢'}"
          json-summary-path: coverage/operator/coverage-summary.json
          json-final-path: coverage/operator/coverage-final.json

      - name: Publish shared coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: shared
          threshold-icons: "{0: '🔴', 80: '🔵', 90: '🟢'}"
          json-summary-path: coverage/shared/coverage-summary.json
          json-final-path: coverage/shared/coverage-final.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  build:
    name: Build Angular Application
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ quality, test ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject Bike Rental API host into all apps
        env:
          BIKE_RENTAL_API: ${{ vars.BIKE_RENTAL_API }}
          BIKE_TIME_TRAVEL_ENABLED: ${{ vars.BIKE_TIME_TRAVEL_ENABLED }}
        run: |
          sed -i "s|BIKE_API_PLACEHOLDER|${BIKE_RENTAL_API}|g" projects/shared/src/environments/environment.prod.ts
          sed -i "s|BIKE_TIME_TRAVEL_PLACEHOLDER|${BIKE_TIME_TRAVEL_ENABLED}|g" projects/shared/src/environments/environment.prod.ts

      # Stamps the deployed commit into two places, so "which version is this
      # client actually running?" is answerable without guesswork:
      #  - environment.appVersion is baked into the bundle, so it reports the
      #    version of the code that is really executing — even when the service
      #    worker is serving a stale build, which is exactly when it matters.
      #  - ngsw.json appData describes the manifest, so the deployed version can
      #    be read straight off the live site:
      #      curl -s https://<pages-host>/<repo>/operator/en/ngsw.json | jq .appData
      - name: Stamp build version
        run: |
          VERSION="${GITHUB_SHA:0:7}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sed -i "s|BIKE_VERSION_PLACEHOLDER|${VERSION}|g" projects/shared/src/environments/environment.prod.ts
          sed -i "s|BIKE_VERSION_PLACEHOLDER|${VERSION}|g" projects/operator/ngsw-config.json
          sed -i "s|BIKE_BUILD_TIME_PLACEHOLDER|${BUILD_TIME}|g" projects/operator/ngsw-config.json
          echo "Stamped version ${VERSION} (${BUILD_TIME})"

      - name: Build gateway
        run: npx ng build gateway --configuration production --base-href /${{ github.event.repository.name }}/

      - name: Build admin
        run: npx ng build admin --configuration production --base-href /${{ github.event.repository.name }}/admin/

      - name: Build operator
        run: npx ng build operator --configuration production --base-href /${{ github.event.repository.name }}/operator/

      - name: Assemble staging directory
        run: |
          mkdir -p staging/admin staging/operator
          cp -r dist/gateway/browser/. staging/
          cp -r dist/admin/browser/. staging/admin/
          cp -r dist/operator/browser/. staging/operator/

      - name: Create root redirect to /en/
        run: |
          BASE="/${{ github.event.repository.name }}"
          cat > staging/index.html << 'HTMLEOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Bike Rental</title>
              <meta http-equiv="refresh" content="0; url=BASE_PLACEHOLDER/en/" />
              <script>window.location.replace('BASE_PLACEHOLDER/en/');</script>
            </head>
            <body></body>
          </html>
          HTMLEOF
          sed -i "s|BASE_PLACEHOLDER|${BASE}|g" staging/index.html

      # Each app is built into per-locale subdirectories (admin/en, admin/ru, ...).
      # A bare /admin/ or /operator/ URL has no index.html, so without this it would
      # fall through to the site 404.html and bounce to the gateway. This adds an
      # entry index.html per app that forwards to the default (en) locale — which is
      # also the URL the OIDC redirect_uri / app links should target.
      - name: Create per-app locale redirects
        run: |
          BASE="/${{ github.event.repository.name }}"
          for app in admin operator; do
            cat > "staging/${app}/index.html" << 'HTMLEOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Bike Rental</title>
              <meta http-equiv="refresh" content="0; url=BASE_PLACEHOLDER/APP_PLACEHOLDER/en/" />
              <script>window.location.replace('BASE_PLACEHOLDER/APP_PLACEHOLDER/en/');</script>
            </head>
            <body></body>
          </html>
          HTMLEOF
            sed -i "s|BASE_PLACEHOLDER|${BASE}|g; s|APP_PLACEHOLDER|${app}|g" "staging/${app}/index.html"
          done

      # GitHub Pages only ever serves the 404.html at the SITE ROOT — nested
      # 404.html files (admin/en/404.html, etc.) are never looked up and are
      # dead weight. This single root 404.html inspects the requested path,
      # works out which app/locale directory actually has a real index.html,
      # and bounces there with the original path+query preserved in a
      # `redirect` param (classic GH Pages SPA trick). The matching
      # restore-script lives in each app's checked-in entry point —
      # projects/{gateway,admin,operator}/src/index.html — and puts the real
      # URL back via history.replaceState before Angular bootstraps, so deep
      # links survive the 404 hop instead of losing their query string.
      #
      # That script MUST stay in the source index.html and must never be
      # injected here: index.html is SHA1-pinned in the operator's ngsw.json
      # hashTable at build time, so rewriting it post-build breaks the service
      # worker (see the integrity check below).
      - name: Add smart 404.html for SPA routing
        run: |
          BASE="/${{ github.event.repository.name }}"
          cat > staging/404.html << 'HTMLEOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Bike Rental</title>
              <script>
                (function () {
                  var base = 'BASE_PLACEHOLDER/';
                  var path = window.location.pathname;
                  var rel = path.indexOf(base) === 0 ? path.slice(base.length) : path.replace(/^\//, '');
                  var segments = rel.split('/').filter(Boolean);
                  var apps = ['admin', 'operator'];
                  var locales = ['en', 'ru'];
                  var appDir;
                  if (apps.indexOf(segments[0]) !== -1) {
                    var locale = locales.indexOf(segments[1]) !== -1 ? segments[1] : 'en';
                    appDir = segments[0] + '/' + locale;
                  } else if (locales.indexOf(segments[0]) !== -1) {
                    appDir = segments[0];
                  } else {
                    appDir = 'en';
                  }
                  var original = path + window.location.search + window.location.hash;
                  window.location.replace(base + appDir + '/?redirect=' + encodeURIComponent(original));
                })();
              </script>
            </head>
            <body></body>
          </html>
          HTMLEOF
          sed -i "s|BASE_PLACEHOLDER|${BASE}|g" staging/404.html

      # Emergency kill switch — the fleet-wide recovery path of last resort.
      # Replaces the operator's ngsw-worker.js with Angular's safety-worker,
      # which unregisters the service worker and deletes every `ngsw:` cache on
      # each client that loads the app. Use it when a bad deploy pins clients to
      # a broken or stale build and no ordinary fix can reach them: run this
      # workflow manually on master with `disable_service_worker: true`, confirm
      # clients recovered, then re-run it normally to restore the PWA.
      #
      # Browsers bypass the HTTP cache for the service worker script itself, so
      # clients pick this up on their next navigation. ngsw-worker.js is not
      # listed in its own ngsw.json hashTable, so swapping it does not trip the
      # integrity check below.
      - name: Deploy service worker kill switch
        if: inputs.disable_service_worker
        run: |
          shopt -s nullglob
          manifests=(staging/operator/*/ngsw.json)
          if [ ${#manifests[@]} -eq 0 ]; then
            echo "No operator ngsw.json under staging/ — nothing to disable."
            exit 1
          fi
          for manifest in "${manifests[@]}"; do
            dir="$(dirname "${manifest}")"
            cp node_modules/@angular/service-worker/safety-worker.js "${dir}/ngsw-worker.js"
            echo "Kill switch armed for ${dir}"
          done

      # Guards the service worker's integrity, and must stay the LAST step that
      # touches staging/ before the upload. Every file listed in an ngsw.json
      # hashTable is pinned by SHA1 at build time; if any of those files is
      # mutated after the build (e.g. a post-build HTML rewrite), the worker
      # fails to install the new version, degrades to EXISTING_CLIENTS_ONLY, and
      # pins clients to the stale cached version forever. This fails the build
      # instead, so such a regression can never reach production again. It also
      # asserts one manifest per app/locale declared in angular.json, so a
      # locale silently losing its service worker fails the build too.
      - name: Verify ngsw.json hash integrity
        run: npm run verify:ngsw

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: staging

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [ quality, test, build ]
    if: always()
    steps:
      - name: All CI checks passed
        run: |
          if [[ "${{ needs.quality.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ ci ]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
